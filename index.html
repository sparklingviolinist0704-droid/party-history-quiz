<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>党史学习自测题库</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.04);
  --card: rgba(255,255,255,0.06);
  --card-hover: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.08);
  --text: #e8e8ed;
  --text-secondary: #9898a8;
  --accent: #c84650;
  --accent-glow: rgba(200,70,80,0.3);
  --success: #3ecf8e;
  --success-glow: rgba(62,207,142,0.3);
  --warning: #f0b848;
  --gold: #d4a853;
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Animated background */
.bg-glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}
.bg-glow.g1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
  top: -200px; left: -150px;
  animation: float1 20s ease-in-out infinite;
}
.bg-glow.g2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #4a6cf7 0%, transparent 70%);
  bottom: -200px; right: -150px;
  animation: float2 25s ease-in-out infinite;
}
.bg-glow.g3 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
  top: 50%; left: 50%;
  animation: float3 22s ease-in-out infinite;
}

@keyframes float1 {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(80px,60px) scale(1.15); }
  66% { transform: translate(-30px,-40px) scale(0.9); }
}
@keyframes float2 {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(-60px,-80px) scale(1.1); }
  66% { transform: translate(40px,50px) scale(0.85); }
}
@keyframes float3 {
  0%,100% { transform: translate(-50%,-50%) scale(1); }
  33% { transform: translate(calc(-50% + 60px),calc(-50% - 50px)) scale(1.2); }
  66% { transform: translate(calc(-50% - 40px),calc(-50% + 60px)) scale(0.9); }
}

/* Grid pattern overlay */
.grid-overlay {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
}

.container {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 24px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  text-align: center;
  padding: 40px 0 20px;
}
.header .emblem {
  font-size: 48px;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 20px var(--accent-glow));
  animation: pulse-emblem 3s ease-in-out infinite;
}
@keyframes pulse-emblem {
  0%,100% { filter: drop-shadow(0 0 20px var(--accent-glow)); }
  50% { filter: drop-shadow(0 0 40px var(--accent-glow)); }
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, #e8e8ed 0%, #c84650 50%, #d4a853 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
.header .subtitle {
  color: var(--text-secondary);
  font-size: 14px;
  margin-top: 6px;
  letter-spacing: 1px;
}

/* Screens */
.screen { display: none; }
.screen.active { display: block; animation: fadeSlideIn 0.5s ease; }
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Cards */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: var(--transition);
}
.card:hover {
  background: var(--card-hover);
  border-color: rgba(255,255,255,0.12);
}

/* Mode Select */
.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 24px;
}
.mode-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 24px;
  text-align: center;
  cursor: pointer;
  backdrop-filter: blur(20px);
  transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
}
.mode-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.4s ease;
}
.mode-card:hover {
  transform: translateY(-4px);
  border-color: rgba(200,70,80,0.4);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 40px var(--accent-glow);
}
.mode-card:hover::before { opacity: 0.15; }
.mode-card .icon {
  font-size: 42px;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.mode-card h3 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 6px;
  position: relative;
  z-index: 1;
}
.mode-card .count {
  font-size: 13px;
  color: var(--text-secondary);
  position: relative;
  z-index: 1;
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.stat-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 8px 18px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
  backdrop-filter: blur(10px);
}
.stat-chip .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.stat-chip .dot.green { background: var(--success); box-shadow: 0 0 8px var(--success-glow); }
.stat-chip .dot.red { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
.stat-chip .dot.gold { background: var(--gold); box-shadow: 0 0 8px rgba(212,168,83,0.4); }

/* Progress */
.progress-wrap {
  margin-bottom: 24px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text-secondary);
}
.progress-bar {
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

/* Question card */
.question-card { position: relative; overflow: hidden; }
.question-card .q-type {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  padding: 4px 12px;
  border-radius: 50px;
  margin-bottom: 16px;
}
.q-type.single { background: rgba(74,108,247,0.15); color: #7b9bff; border: 1px solid rgba(74,108,247,0.3); }
.q-type.multi { background: rgba(240,184,72,0.15); color: #f0b848; border: 1px solid rgba(240,184,72,0.3); }
.question-card .q-number {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.question-card .q-text {
  font-size: 18px;
  font-weight: 500;
  line-height: 1.7;
  margin-bottom: 24px;
}

/* Options */
.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: left;
  font-size: 15px;
  color: var(--text);
  font-family: inherit;
  width: 100%;
  position: relative;
  overflow: hidden;
}
.option-btn:hover {
  background: var(--card-hover);
  border-color: rgba(255,255,255,0.18);
  transform: translateX(3px);
}
.option-btn .opt-label {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 14px;
  flex-shrink: 0;
  transition: all 0.25s ease;
}
.option-btn:hover .opt-label {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.25);
}
.option-btn.selected {
  background: rgba(74,108,247,0.12);
  border-color: rgba(74,108,247,0.5);
  box-shadow: 0 0 20px rgba(74,108,247,0.1);
}
.option-btn.selected .opt-label {
  background: #4a6cf7;
  border-color: #4a6cf7;
  color: #fff;
}
.option-btn.correct {
  background: rgba(62,207,142,0.12) !important;
  border-color: rgba(62,207,142,0.5) !important;
  box-shadow: 0 0 20px var(--success-glow) !important;
  animation: correctPulse 0.6s ease;
}
.option-btn.correct .opt-label {
  background: var(--success) !important;
  border-color: var(--success) !important;
  color: #fff !important;
}
.option-btn.wrong {
  background: rgba(200,70,80,0.12) !important;
  border-color: rgba(200,70,80,0.5) !important;
  box-shadow: 0 0 20px var(--accent-glow) !important;
  animation: shake 0.5s ease;
}
.option-btn.wrong .opt-label {
  background: var(--accent) !important;
  border-color: var(--accent) !important;
  color: #fff !important;
}
@keyframes correctPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.01); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Feedback bar */
.feedback {
  margin-top: 20px;
  padding: 16px 20px;
  border-radius: var(--radius-sm);
  display: none;
  animation: fadeSlideIn 0.4s ease;
}
.feedback.show { display: block; }
.feedback.correct-fb {
  background: rgba(62,207,142,0.08);
  border: 1px solid rgba(62,207,142,0.25);
}
.feedback.wrong-fb {
  background: rgba(200,70,80,0.08);
  border: 1px solid rgba(200,70,80,0.25);
}
.feedback .fb-icon { font-size: 20px; margin-right: 8px; }
.feedback .fb-title { font-weight: 600; margin-bottom: 4px; }
.feedback .fb-detail { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
.feedback .memory-tip {
  margin-top: 12px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  border-left: 3px solid var(--gold);
  font-size: 13px;
}
.memory-tip .tip-label {
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 4px;
  font-size: 12px;
  letter-spacing: 1px;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 28px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #e05560);
  color: #fff;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}
.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  background: var(--card-hover);
  border-color: rgba(255,255,255,0.2);
}
.btn-next {
  margin-top: 20px;
  width: 100%;
}
.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  pointer-events: none;
}

/* Navigation */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.back-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 8px 16px;
  border-radius: 50px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}
.back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

/* Wrong answers list */
.wrong-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
.wrong-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 20px;
  transition: var(--transition);
}
.wrong-item:hover { background: var(--card-hover); }
.wrong-item .w-q { font-weight: 500; margin-bottom: 10px; font-size: 15px; }
.wrong-item .w-info {
  display: flex;
  gap: 16px;
  font-size: 13px;
  flex-wrap: wrap;
}
.wrong-item .w-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 50px;
  font-size: 12px;
}
.w-badge.your { background: rgba(200,70,80,0.15); color: var(--accent); }
.w-badge.correct-ans { background: rgba(62,207,142,0.15); color: var(--success); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}
.empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.6; }
.empty-state h3 { color: var(--text); margin-bottom: 8px; }

/* Action row */
.action-row {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  flex-wrap: wrap;
}

/* Completion */
.completion {
  text-align: center;
  padding: 40px 20px;
}
.completion .big-icon { font-size: 72px; margin-bottom: 16px; animation: bounceIn 0.8s ease; }
@keyframes bounceIn {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
.completion h2 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--success), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.completion .score-ring {
  width: 140px; height: 140px;
  margin: 24px auto;
  position: relative;
}
.score-ring svg { transform: rotate(-90deg); }
.score-ring .inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.score-ring .pct { font-size: 36px; font-weight: 700; }
.score-ring .label { font-size: 12px; color: var(--text-secondary); }

/* Responsive */
@media (max-width: 640px) {
  .mode-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 22px; }
  .container { padding: 16px; }
  .card { padding: 20px; }
  .question-card .q-text { font-size: 16px; }
  .option-btn { padding: 14px 16px; font-size: 14px; }
  .stats-bar { gap: 8px; }
  .stat-chip { padding: 6px 12px; font-size: 12px; }
  .action-row { flex-direction: column; }
  .btn { width: 100%; }
}

/* Confetti particles (for correct answers) */
.confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 100;
}
.confetti-piece {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 2px;
  animation: confettiFall 1.5s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-100px) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0); opacity: 0; }
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 12px 24px;
  border-radius: 50px;
  font-size: 14px;
  z-index: 200;
  backdrop-filter: blur(20px);
  animation: toastIn 0.4s ease, toastOut 0.4s ease 2s forwards;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}
@keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(-20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; transform: translateX(-50%) translateY(-20px); } }
</style>
</head>
<body>

<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="bg-glow g3"></div>
<div class="grid-overlay"></div>

<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <div class="emblem">☭</div>
    <h1>党史学习自测题库</h1>
    <div class="subtitle">中国共产党历史 · 互动学习平台</div>
  </div>

  <!-- Screen: Home -->
  <div class="screen active" id="screen-home">
    <div class="mode-grid">
      <div class="mode-card" onclick="startQuiz('single')">
        <div class="icon">📝</div>
        <h3>单项选择题</h3>
        <div class="count">共 122 题</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">选择一个正确答案</div>
      </div>
      <div class="mode-card" onclick="startQuiz('multi')">
        <div class="icon">📋</div>
        <h3>多项选择题</h3>
        <div class="count">共 43 题</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">选择所有正确答案</div>
      </div>
    </div>
    <div style="text-align:center;margin-top:24px;">
      <button class="btn btn-secondary" onclick="showWrongBook()" id="btn-wrong-book">
        📖 错题库
        <span id="wrong-count-badge" style="background:var(--accent);color:#fff;padding:2px 8px;border-radius:50px;font-size:11px;margin-left:4px;display:none;">0</span>
      </button>
    </div>
  </div>

  <!-- Screen: Quiz -->
  <div class="screen" id="screen-quiz">
    <div class="nav-row">
      <button class="back-btn" onclick="goHome()">← 返回首页</button>
      <div style="font-size:13px;color:var(--text-secondary);" id="quiz-mode-label"></div>
    </div>
    <div class="stats-bar">
      <div class="stat-chip"><span class="dot green"></span> 正确 <strong id="correct-count">0</strong></div>
      <div class="stat-chip"><span class="dot red"></span> 错误 <strong id="wrong-count">0</strong></div>
      <div class="stat-chip"><span class="dot gold"></span> 进度 <strong id="progress-fraction">0/0</strong></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-info"><span>答题进度</span><span id="progress-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="card question-card">
      <div class="q-type" id="q-type-badge"></div>
      <div class="q-number" id="q-number"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options-list" id="options-container"></div>
      <button class="btn btn-primary btn-next" id="btn-submit" style="display:none;" onclick="submitMulti()">确认提交</button>
      <div class="feedback" id="feedback"></div>
      <button class="btn btn-primary btn-next" id="btn-next" style="display:none;" onclick="nextQuestion()">下一题 →</button>
    </div>
  </div>

  <!-- Screen: Wrong Book -->
  <div class="screen" id="screen-wrong">
    <div class="nav-row">
      <button class="back-btn" onclick="goHome()">← 返回首页</button>
      <button class="back-btn" onclick="clearWrongBook()" style="color:var(--accent);">🗑 清空错题库</button>
    </div>
    <h2 style="margin-bottom:4px;">📖 错题库</h2>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:20px;">你的错误题目都在这里，反复练习加深记忆</p>
    <div class="wrong-list" id="wrong-list"></div>
    <div class="empty-state" id="wrong-empty" style="display:none;">
      <div class="empty-icon">🎉</div>
      <h3>错题库是空的</h3>
      <p>继续保持，太棒了！</p>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = {"single": [{"id": 1, "question": "中国第一个传播马克思主义并主张向俄国十月革命学习的先进分子（ ）。", "options": [{"label": "A", "text": "陈独秀"}, {"label": "B", "text": "李大钊"}, {"label": "C", "text": "毛泽东"}, {"label": "D", "text": "瞿秋白"}], "answer": "B"}, {"id": 2, "question": "（ ）拉开了中国新民主主义革命的帷幕。", "options": [{"label": "A", "text": "新文化运动"}, {"label": "B", "text": "五四运动"}, {"label": "C", "text": "中国共产党成立"}, {"label": "D", "text": "五卅运动"}], "answer": "B"}, {"id": 3, "question": "五四运动孕育了以爱国、进步、民主、科学为主要内容的伟大五四精神，其核心是（ ），在近代以来中华民族追求民族独立和发展进步的历史进程中具有里程碑意义。", "options": [{"label": "A", "text": "爱国主义精神"}, {"label": "B", "text": "团结互助精神"}, {"label": "C", "text": "社会主义精神"}, {"label": "D", "text": "集体主义精神"}], "answer": "A"}, {"id": 4, "question": "五四运动突破了知识分子的狭小范围，成为很多阶级参加的全国规模的群众运动，不包括以下哪个阶级（ ）。", "options": [{"label": "A", "text": "工人阶级"}, {"label": "B", "text": "小资产阶级"}, {"label": "C", "text": "资产阶级"}, {"label": "D", "text": "地主阶级"}], "answer": "D"}, {"id": 5, "question": "（ ）与工人群众相结合的过程，就是马克思主义同中国工人运动相结合的过程。", "options": [{"label": "A", "text": "农民"}, {"label": "B", "text": "先进知识分子"}, {"label": "C", "text": "民族资产阶级"}, {"label": "D", "text": "地主阶级"}], "answer": "B"}, {"id": 6, "question": "五四运动后期，中国（ ）以自己特有的组织性、纪律性和坚定的革命性：在运动中发挥了主力军的作用。", "options": [{"label": "A", "text": "农民"}, {"label": "B", "text": "工人阶级"}, {"label": "C", "text": "小资产阶级"}, {"label": "D", "text": "资产阶级"}], "answer": "B"}, {"id": 7, "question": "1920年3月，李大钊在（ ）组织成立马克思学说研究会。这既是中国最早的学习和研究马克思主义的团体，也为建党作了重要准备。", "options": [{"label": "A", "text": "清华大学"}, {"label": "B", "text": "燕京大学"}, {"label": "C", "text": "北京大学"}, {"label": "D", "text": "辅仁大学"}], "answer": "C"}, {"id": 8, "question": "在（ ）成立的共产党早期组织，实际上是中国共产党的发起组织，是各地共产主义者进行建党活动的联络中心。", "options": [{"label": "A", "text": "北京"}, {"label": "B", "text": "上海"}, {"label": "C", "text": "武汉"}, {"label": "D", "text": "广州"}], "answer": "B"}, {"id": 9, "question": "（ ）在潜心翻译时，把粽子蘸着墨汁吃掉却浑然不觉，还说：“够甜，够甜的了！”“真理的味道非常甜”，这彰显了中国的共产主义者对马克思主义救国真理的渴求，对共产主义理想的坚定信念。", "options": [{"lab : "1927年初，毛泽东对湖南农民运动进行了32天考察。在《湖南农民运动考察报告》中，他强调必须依靠（ ）作为“革命先锋”。", "options": [{"label": "A", "text": "富农"}, {"label": "B", "text": "中农"}, {"label": "C", "text": "贫农"}, {"label": "D", "text": "佃农"}], "answer": "C"}, {"id": 19, "question": "1927年（ ），蒋介石在（ ）发动反革命政变。", "options": [{"label": "A", "text": "4月2日，南京"}, {"label": "B", "text": "4月12日，上海"}, {"label": "C", "text": "4月12日，南京"}, {"label": "D", "text": "4月2日，上海"}], "answer": "B"}, {"id": 20, "question": "他在狱中写下了《可爱的中国》《清贫》等不朽篇章，不仅发出“敌人只能砍下我们的头颅，决不能动摇我们的信仰”的铮铮誓言，还描绘了他对未来的期盼：“中国一定有个可赞美的光明前途”，“生育我们的母亲，也会最美丽地装饰起来，与世界上各位母亲平等地携手了”。他就是烈士（ ）。", "options": [{"label": "A", "text": "陈延年"}, {"label": "B", "text": "李大钊"}, {"label": "C", "text": "方志敏"}, {"label": "D", "text": "夏明翰"}], "answer": "C"}, {"id": 21, "question": "中国共产党早期组织领导的第一个工会是（ ）。", "options": [{"label": "A", "text": "上海机器工会"}, {"label": "B", "text": "长辛店工人俱乐部"}, {"label": "C", "text": "武汉工会"}, {"label": "D", "text": "长沙工会"}], "answer": "A"}, {"id": 22, "question": "（ ）标志着中国共产党独立地领导革命战争、创建人民军队和武装夺取政权的开始。", "options": [{"label": "A", "text": "武昌起义"}, {"label": "B", "text": "南昌起义"}, {"label": "C", "text": "秋收起义"}, {"label": "D", "text": "广州起义"}], "answer": "B"}, {"id": 23, "question": "（ ）从进攻大城市转到向农村进军，这是中国人民革命发展史上具有决定意义的新起点。", "options": [{"label": "A", "text": "武昌起义"}, {"label": "B", "text": "南昌起义"}, {"label": "C", "text": "秋收起义"}, {"label": "D", "text": "广州起义"}], "answer": "C"}, {"id": 24, "question": "毛泽东率领秋收起义部队南下时，决定选择在（ ）地区建立革命根据地。", "options": [{"label": "A", "text": "瑞金"}, {"label": "B", "text": "南昌"}, {"label": "C", "text": "井冈山"}, {"label": "D", "text": "大别山"}], "answer": "C"}, {"id": 25, "question": "1927年10月，毛泽东率领秋收起义余部挺进井冈山，在这里创立了全国第一个农村革命根据地。1928年4月朱德、陈毅率领的南昌起义余部到达井冈山与毛泽东领导的部队会合，组成了中国工农红军第（ ）军。", "options": [{"label": "A", "text": "一"}, {"label": "B", "text": "二"}, {"label": "C", "text": "三"}, {"label": "D", "text": "四"}], "answer": "D"}, {"id": 26, "question": "第一个红色政权——中华苏维埃共和国临时中央政府的诞生地在（ ）。", "options": [{"label": "A", "text": "上海"}, {"label": "B", "text": "井冈山"}, {"label": "C", "text": "瑞金"}, {"label": "D", "text": "延安"}], "answer": "C"}, {"id": 27, "question": "1928年6月在莫斯科举行的是中国共产党的第（ ）次全国代表大会。", "options": [{"label": "A", "text": "三"}, {"label": "B", "text": "四"}, {"label": "C", "text": "五"}, {"label": "D", "text": "六"}], "answer": "D"}, {"id": 28, "question": "1929年，（ ）决议的中心思想是要用无产阶级思想进行军队和党的建设。", "options": [{"label": "A", "text": "遵义会议"}, {"label": "B", "text": "古田会议"}, {"label": "C", "text": "八七会议"}, {"label": "D", "text": "龙岩会议"}], "answer": "B"}, {"id": 29, "question": "（ ）以后，中日之间的民族矛盾逐渐上升为主要矛盾，中国国内的阶级关系发生重大变动。", "options": [{"label": "A", "text": "卢沟桥事变"}, {"label": "B", "text": "九一八事变"}, {"label": "C", "text": "天津事变"}, {"label": "D", "text": "西安事变"}], "answer": "B"}, {"id": 30, "question": "（ ）开始确立以毛泽东同志为主要代表的马克思主义正确路线在中共中央的领导地位。", "options": [{"label": "A", "text": "古田会议"}, {"label": "B", "text": "八七会议"}, {"label": "C", "text": "遵义会议"}, {"label": "D", "text": "龙岩会议"}], "answer": "C"}, {"id": 31, "question": "中央红军长征进入大凉山彝族地区时，红军总参谋长（ ）同彝族果基部落首领小叶丹歃血为盟，实现了民族团结，使红军顺利地通过这个地区。", "options": [{"label": "A", "text": "彭德怀"}, {"label": "B", "text": "刘伯承"}, {"label": "C", "text": "叶剑英"}, {"label": "D", "text": "林彪"}], "answer": "B"}, {"id": 32, "question": "长征途中翻越的第一座人迹罕至的大雪山是（ ）。", "options": [{"label": "A", "text": "昆仑山"}, {"label": "B", "text": "大别山"}, {"label": "C", "text": "狼牙山"}, {"label": "D", "text": "夹金山"}], "answer": "D"}, {"id": 33, "question": "（ ），日本由此开始了全面侵华战争，中国展开全国性抗战。", "options": [{"label": "A", "text": "卢沟桥事变"}, {"label": "B", "text": "九一八事变"}, {"label": "C", "text": "天津事变"}, {"label": "D", "text": "西安事变"}], "answer": "A"}, {"id": 34, "question": "1935年，在中共北平临时工委的组织和领导下，针对日本制造的华北事变，北平学生举行了声势浩大的抗日救亡示威游行活动，这就是著名的（ ）。", "options": [{"label": "A", "text": "一二·一运动"}, {"label": "B", "text": "五四运动"}, {"label": "C", "text": "一二・九运动"}, {"label": "D", "text": "五二〇运动"}], "answer": "C"}, {"id": 35, "question": "中共中央确定抗日民族统一战线的方针政策的会议是（ ）。", "options": [{"label": "A", "text": "洛川会议"}, {"label": "B", "text": "巴西会议"}, {"label": "C", "text": "俄界会议"}, {"label": "D", "text": "瓦窑堡会议"}], "answer": "D"}, {"id": 36, "question": "（ ）是全国抗战爆发后中国军队主动对日作战取得的第一个重大胜利，打破了侵华日军所谓“不可战胜”的神话。", "options": [{"label": "A", "text": "平型关大捷"}, {"label": "B", "text": "台儿庄战役"}, {"label": "C", "text": "武汉会战"}, {"label": "D", "text": "长沙大捷"}], "answer": "A"}, {"id": 37, "question": "1938年10月日军占领武汉、广州后，抗日战争进入（ ）。", "options": [{"label": "A", "text": "战略防御阶段"}, {"label": "B", "text": "战略相持阶段"}, {"label": "C", "text": "战略反攻阶段"}, {"label": "D", "text": "战略撤退阶段"}], "answer": "B"}, {"id": 38, "question": "在抗日战争的战略相持阶段，（ ）成为主要的抗日作战方式。", "options": [{"label": "A", "text": "敌后游击战争"}, {"label": "B", "text": "国民党正面战场"}, {"label": "C", "text": "共产党正面战场"}, {"label": "D", "text": "敌后游击战争和国民党正面战场相结合"}], "answer": "A"}, {"id": 39, "question": "（ ）是全国抗战以来八路军在华北发动的规模最大、持续时间最长的一次带战略性进攻的战役。", "options": [{"label": "A", "text": "百团大战"}, {"label": "B", "text": "淞沪会战"}, {"label": "C", "text": "平津战役"}, {"label": "D", "text": "武汉会战"}], "answer": "A"}, {"id": 40, "question": "皖南事变后，中共中央军委于1941年1月20日决定重建新四军军部，任命（ ）为新四军代军长、政治委员。", "options": [{"label": "A", "text": "叶挺、刘少奇"}, {"label": "B", "text": "陈毅、张云逸"}, {"label": "C", "text": "陈毅、刘少奇"}, {"label": "D", "text": "张云逸、刘少奇"}], "answer": "C"}, {"id": 41, "question": "1939年10月，毛泽东在《<共产党人>发刊词》中指出：统一战线，武装斗争，（ ），是中国共产党在中国革命中战胜敌人的三个法宝。", "options": [{"label": "A", "text": "党的建设"}, {"label": "B", "text": "思想建设"}, {"label": "C", "text": "政治建设"}, {"label": "D", "text": "文化建设"}], "answer": "A"}, {"id": 42, "question": "1941年5月19日，毛泽东在延安高级干部会议上作（ ）的报告，第一次解答了什么是“实事求是”。", "options": [{"label": "A", "text": "《改造我们的学习》"}, {"label": "B", "text": "《论联合政府》"}, {"label": "C", "text": "《论持久战》"}, {"label": "D", "text": "《新民主主义论》"}], "answer": "A"}, {"id": 43, "question": "（ ）4月23日，中共七大在延安杨家岭开幕。", "options": [{"label": "A", "text": "1941年"}, {"label": "B", "text": "1943年"}, {"label": "C", "text": "1945年"}, {"label": "D", "text": "1947年"}], "answer": "C"}, {"id": 44, "question": "（ ）为党中央和各路  "text": "东风压倒西风"}, {"label": "C", "text": "一切反动派都是纸老虎"}, {"label": "D", "text": "没有调查就没有发言权"}], "answer": "C"}, {"id": 55, "question": "以（ ）为先锋的爱国民主运动同国民党政府之间的斗争，逐步形成配合人民解放战争的第二条战线。党适时地提出在国民党统治区人民争生存斗争的基础上，建立反卖国、反内战、反独裁的广大阵线，使第二条战线的斗争更加广泛、深入地发展起来。", "options": [{"label": "A", "text": "学生"}, {"label": "B", "text": "工人"}, {"label": "C", "text": "农民"}, {"label": "D", "text": "民族资产阶级"}], "answer": "A"}, {"id": 56, "question": "（ ）率东北民主联军先后发起秋季、冬季攻势作战，将国民党军压缩在沈阳、长春、锦州三个互不联系的、面积仅占东北总面积3%的狭小地区，从根本上改变了东北战局。", "options": [{"label": "A", "text": "刘伯承、邓小平"}, {"label": "B", "text": "林彪、罗荣桓"}, {"label": "C", "text": "陈赓、谢富治"}, {"label": "D", "text": "陈毅、粟裕"}], "answer": "B"}, {"id": 57, "question": "1945年9 19日，中共中央发出《目前任务和战略部署的指示》，提出了“向北发展，向南防御”的战略方针，其核心是控制（ ）。", "options": [{"label": "A", "text": "华北"}, {"label": "B", "text": "华东"}, {"label": "C", "text": "华中"}, {"label": "D", "text": "东北"}], "answer": "D"}, {"id": 58, "question": "解放战争时期，毛泽东指出：“如果我们能够普遍地彻底地解决（ ）问题，我们就获得了足以战胜一切敌人的最基本的条件。”", "options": [{"label": "A", "text": "妇女"}, {"label": "B", "text": "群众"}, {"label": "C", "text": "土地"}, {"label": "D", "text": "阶级"}], "answer": "C"}, {"id": 59, "question": "1947年7月至9月，为推动解放区土改运动进一步发展，（ ）在西柏坡主持召开全国土地会议，制定《中国土地法大纲》，并于同年10月由中共中央批准公布。", "options": [{"label": "A", "text": "毛泽东"}, {"label": "B", "text": "周恩来"}, {"label": "C", "text": "刘少奇"}, {"label": "D", "text": "邓小平"}], "answer": "C"}, {"id": 60, "question": "三大战役的胜利，也是人民战争的伟大胜利。（ ）曾深情并形象地说过，淮海战役的胜利是人民群众用小车推出来的。", "options": [{"label": "A", "text": "陈毅"}, {"label": "B", "text": "陈云"}, {"label": "C", "text": "毛泽东"}, {"label": "D", "text": "朱德"}], "answer": "A"}, {"id": 61, "question": "（ ）的胜利，是靠老百姓用小船划出来的。木帆船、渔船是百姓赖以为生的生产资料、命根子，但他们纷纷携船支援。", "options": [{"label": "A", "text": "淮海战役"}, {"label": "B", "text": "渡江战役"}, {"label": "C", "text": "海南岛战役"}, {"label": "D", "text": "一江山岛战役"}], "answer": "B"}, {"id": 62, "question": "1949年3月在（ ）召开的党的七届二中全会，规定党在全国胜利后在政治、经济、外交方面应当采取的基本政策，指出中国由农业国转变为工业国、由新民主主义社会转变为社会主义社会的发展方向。", "options": [{" "options": [{"label": "A", "text": "社会主义革命"}, {"label": "B", "text": "新民主主义"}, {"label": "C", "text": "中国特色社会主义"}, {"label": "D", "text": "社会主义建设"}], "answer": "C"}], "multi": [{"id": 1, "question": "党深刻认识到，近代中国社会主要矛盾是（ ）。实现中华民族伟大复兴，必须进行反帝反封建斗争。", "options": [{"label": "A", "text": "工人阶级和资产阶级的矛盾"}, {"label": "B", "text": "帝国主义和中华民族的矛盾"}, {"label": "C", "text": "封建主义和人民大众的矛盾"}, {"label": "D", "text": "人民对于经济文化迅速发展的需要同当前经济文化不能满足人民需要的状况之间的矛盾"}], "answer": "BC"}, {"id": 2, "question": "党的三大正确估计了孙中山的革命立场和国民党进行改组的可能性，决定共产党员以个人身份加入国民党，以实现国共合作。明确规定共产党员加入国民党时，党必须在（ ）持自己的独立性。", "options": [{"label": "A", "text": "政治上"}, {"label": "B", "text": "行为上"}, {"label": "C", "text": "思想上"}, {"label": "D", "text": "组织上"}], "answer": "ACD"}, {"id": 3, "question": "北伐战争的直接打击目标是帝国主义支持的北洋军阀，主要有（）三支势力。", "options": [{"label": "A", "text": "吴佩孚"}, {"label": "B", "text": "孙传芳"}, {"label": "C", "text": "张作霖"}, {"label": "D", "text": "阎锡山"}], "answer": "ABC"}, {"id": 4, "question": "中国工人运动第一次高潮的13个月里，全国发生大小罢工100余次，参加人数在30万以上。其中，（ ）最具代表性，充分显示出组织起来的工人阶级的力量。", "options": [{"label": "A", "text": "香港海员罢工"}, {"label": "B", "text": "京汉铁路工人大罢工"}, {"label": "C", "text": "安源路矿工人大罢工"}, {"label": "D", "text": "开滦煤矿工人大罢工"}], "answer": "ABCD"}, {"id": 5, "question": "第一次国共合作中，在黄埔军校担任政治教官和各级领导工作的共产党人有（ ）。", "options": [{"label": "A", "text": "周恩来"}, {"label": "B", "text": "恽代英"}, {"label": "C", "text": "聂荣臻"}, {"label": "D", "text": "徐向前"}], "answer": "ABC"}, {"id": 6, "question": "1927年9月，毛泽东领导秋收起义部队在江西永新进行了著名的“三湾改编”，建立了党的各级组织和党代表制度，主要包括（ ）。", "options": [{"label": "A", "text": "支部建在连上"}, {"label": "B", "text": "连以上设立党代表"}, {"label": "C", "text": "建立各级士兵委员会"}, {"label": "D", "text": "营、团建立党委"}], "answer": "ABCD"}, {"id": 7, "question": "1927年底，毛泽东在领导创建井冈山农村革命根据地的斗争中，规定部队必须执行（ ）三项任务。", "options": [{"label": "A", "text": "打仗消灭敌人"}, {"label": "B", "text": "打土豪筹款子"}, {"label": "C", "text": "开展分田斗争"}, {"label": "D", "text": "做群众工作"}], "answer": "ABD"}, {"id": 8, "question": "中国共产党第七次全国代表大会，把党在长期奋斗中形成的优良传统和作风概括为（ ） // State
let mode = null;
let questions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let selectedOptions = [];
let wrongBook = JSON.parse(localStorage.getItem('partyHistoryWrongBook') || '{}');

// Ensure wrongBook has the right structure
if (!wrongBook.single) wrongBook.single = [];
if (!wrongBook.multi) wrongBook.multi = [];

function saveWrongBook() {
  localStorage.setItem('partyHistoryWrongBook', JSON.stringify(wrongBook));
  updateWrongBadge();
}

function updateWrongBadge() {
  const total = (wrongBook.single || []).length + (wrongBook.multi || []).length;
  const badge = document.getElementById('wrong-count-badge');
  if (total > 0) {
    badge.textContent = total;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function goHome() {
  showScreen('home');
  updateWrongBadge();
}

function startQuiz(type) {
  mode = type;
  questions = shuffle(ALL_QUESTIONS[type]);
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  answered = false;
  selectedOptions = [];

  document.getElementById('quiz-mode-label').textContent =
    type === 'single' ? '📝 单项选择题' : '📋 多项选择题';
  document.getElementById('correct-count').textContent = '0';
  document.getElementById('wrong-count').textContent = '0';
  document.getElementById('q-type-badge').textContent = type === 'single' ? '单选题' : '多选题';
  document.getElementById('q-type-badge').className = 'q-type ' + (type === 'single' ? 'single' : 'multi');

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  if (currentIndex >= questions.length) {
    showCompletion();
    return;
  }

  const q = questions[currentIndex];
  answered = false;
  selectedOptions = [];

  document.getElementById('q-number').textContent =
    '第 ' + (currentIndex + 1) + ' / ' + questions.length + ' 题';
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('progress-fraction').textContent = (currentIndex + 1) + '/' + questions.length;

  const pct = Math.round((currentIndex / questions.length) * 100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  // Options
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="opt-label">' + opt.label + '</span><span>' + opt.text + '</span>';
    btn.onclick = function() { onOptionClick(opt.label, btn); };
    container.appendChild(btn);
  });

  // Hide submit/next buttons and feedback
  document.getElementById('btn-submit').style.display = mode === 'multi' ? 'flex' : 'none';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';

  updateStats();
}

function onOptionClick(label, btn) {
  if (answered) return;

  if (mode === 'single') {
    // Single choice: immediate check
    selectedOptions = [label];
    answered = true;

    // Highlight selected
    btn.classList.add('selected');

    const q = questions[currentIndex];
    const isCorrect = label === q.answer;

    if (isCorrect) {
      btn.classList.add('correct');
      correctCount++;
      spawnConfetti();
      showFeedback(true, q);
      document.getElementById('btn-next').style.display = 'flex';
      document.getElementById('btn-next').focus();
    } else {
      btn.classList.add('wrong');
      wrongCount++;
      // Highlight correct option
      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => {
        const lbl = b.querySelector('.opt-label').textContent;
        if (lbl === q.answer) b.classList.add('correct');
      });
      addToWrongBook(q);
      showFeedback(false, q);
      document.getElementById('btn-next').style.display = 'flex';
      document.getElementById('btn-next').focus();
    }

    disableAllOptions();
    updateStats();
  } else {
    // Multi choice: toggle selection
    const idx = selectedOptions.indexOf(label);
    if (idx >= 0) {
      selectedOptions.splice(idx, 1);
      btn.classList.remove('selected');
    } else {
      selectedOptions.push(label);
      btn.classList.add('selected');
    }
  }
}

function submitMulti() {
  if (answered || selectedOptions.length === 0) return;
  answered = true;

  const q = questions[currentIndex];
  const myAnswer = selectedOptions.sort().join('');
  const correctAnswer = q.answer.split('').sort().join('');

  const allBtns = document.querySelectorAll('.option-btn');

  if (myAnswer === correctAnswer) {
    correctCount++;
    selectedOptions.forEach(l => {
      allBtns.forEach(b => {
        if (b.querySelector('.opt-label').textContent === l) b.classList.add('correct');
      });
    });
    spawnConfetti();
    showFeedback(true, q);
  } else {
    wrongCount++;
    selectedOptions.forEach(l => {
      allBtns.forEach(b => {
        if (b.querySelector('.opt-label').textContent === l) b.classList.add('wrong');
      });
    });
    // Highlight correct ones
    q.answer.split('').forEach(l => {
      allBtns.forEach(b => {
        if (b.querySelector('.opt-label').textContent === l) b.classList.add('correct');
      });
    });
    addToWrongBook(q);
    showFeedback(false, q);
  }

  disableAllOptions();
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-next').style.display = 'flex';
  document.getElementById('btn-next').focus();
  updateStats();
}

function disableAllOptions() {
  document.querySelectorAll('.option-btn').forEach(b => { b.style.pointerEvents = 'none'; });
}

function showFeedback(isCorrect, q) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');

  if (isCorrect) {
    fb.innerHTML = '<div class="fb-title"><span class="fb-icon">✅</span> 回答正确！</div>';
  } else {
    const correctOpts = q.answer.split('').map(l => {
      const opt = q.options.find(o => o.label === l);
      return opt ? l + '. ' + opt.text : l;
    }).join('；');

    fb.innerHTML =
      '<div class="fb-title"><span class="fb-icon">❌</span> 回答错误</div>' +
      '<div class="fb-detail">正确答案是：<strong style="color:var(--success);">' + correctOpts + '</strong></div>' +
      '<div class="memory-tip">' +
      '<div class="tip-label">💡 记忆提示</div>' +
      '<div>请将正确答案与题目关键信息关联记忆。建议反复练习此题，加深印象。可以尝试用自己的话复述正确答案，增强记忆效果。</div>' +
      '</div>';
  }
}

function addToWrongBook(q) {
  const type = mode;
  const exists = wrongBook[type].some(item => item.question === q.question);
  if (!exists) {
    wrongBook[type].push(q);
    saveWrongBook();
  }
}

function nextQuestion() {
  currentIndex++;
  selectedOptions = [];
  answered = false;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-submit').style.display = 'none';
  renderQuestion();
}

function updateStats() {
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = wrongCount;
  document.getElementById('progress-fraction').textContent = (currentIndex + 1) + '/' + questions.length;
  const pct = Math.round(((currentIndex + 1) / questions.length) * 100);
  document.getElementById('progress-pct').textContent = Math.min(pct, 100) + '%';
  document.getElementById('progress-fill').style.width = Math.min(pct, 100) + '%';
}

function showCompletion() {
  const total = correctCount + wrongCount;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 100;
  const circumference = 2 * Math.PI * 54;
  const offset = circumference - (pct / 100) * circumference;

  const quizDiv = document.getElementById('screen-quiz');
  quizDiv.innerHTML =
    '<div class="completion">' +
    '<div class="big-icon">' + (pct >= 80 ? '🏆' : pct >= 60 ? '⭐' : '📚') + '</div>' +
    '<h2>' + (pct >= 80 ? '太棒了！' : pct >= 60 ? '继续加油！' : '多多练习！') + '</h2>' +
    '<p style="color:var(--text-secondary);">你已完成所有题目</p>' +
    '<div class="score-ring">' +
    '<svg width="140" height="140" viewBox="0 0 140 140"><circle cx="70" cy="70" r="54" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/><circle cx="70" cy="70" r="54" fill="none" stroke="url(#scoreGrad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '" style="transition: stroke-dashoffset 1.5s ease;"/><defs><linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#c84650"/><stop offset="100%" style="stop-color:#d4a853"/></linearGradient></defs></svg>' +
    '<div class="inner"><span class="pct">' + pct + '%</span><span class="label">正确率</span></div>' +
    '</div>' +
    '<div style="display:flex;gap:20px;justify-content:center;margin:20px 0;">' +
    '<div><span style="color:var(--success);font-size:24px;font-weight:700;">' + correctCount + '</span><br><span style="font-size:12px;color:var(--text-secondary);">正确</span></div>' +
    '<div><span style="color:var(--accent);font-size:24px;font-weight:700;">' + wrongCount + '</span><br><span style="font-size:12px;color:var(--text-secondary);">错误</span></div>' +
    '<div><span style="color:var(--gold);font-size:24px;font-weight:700;">' + total + '</span><br><span style="font-size:12px;color:var(--text-secondary);">总计</span></div>' +
    '</div>' +
    '<div class="action-row" style="justify-content:center;">' +
    '<button class="btn btn-primary" onclick="startQuiz(\'' + mode + '\')">🔄 重新答题</button>' +
    '<button class="btn btn-secondary" onclick="goHome()">🏠 返回首页</button>' +
    (wrongCount > 0 ? '<button class="btn btn-secondary" onclick="showWrongBook()">📖 查看错题</button>' : '') +
    '</div></div>';
}

function showWrongBook() {
  showScreen('wrong');
  renderWrongBook();
}

function renderWrongBook() {
  const list = document.getElementById('wrong-list');
  const empty = document.getElementById('wrong-empty');
  const allWrong = [
    ...(wrongBook.single || []).map(q => ({...q, type: 'single'})),
    ...(wrongBook.multi || []).map(q => ({...q, type: 'multi'}))
  ];

  if (allWrong.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = allWrong.map((q, i) => {
    const typeLabel = q.type === 'single' ? '单选' : '多选';
    const typeClass = q.type === 'single' ? 'single' : 'multi';
    const correctOpts = q.answer.split('').map(l => {
      const opt = q.options.find(o => o.label === l);
      return opt ? l + '. ' + opt.text : l;
    }).join('；');
    return '<div class="wrong-item">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
      '<span class="q-type ' + typeClass + '" style="font-size:10px;padding:2px 8px;">' + typeLabel + '</span>' +
      '<button style="background:none;border:1px solid var(--border);color:var(--accent);padding:4px 12px;border-radius:50px;cursor:pointer;font-size:12px;font-family:inherit;" onclick="removeWrong(' + i + ',\'' + q.type + '\',\'' + q.question.replace(/'/g, "\\'") + '\')">移除</button>' +
      '</div>' +
      '<div class="w-q">' + (i + 1) + '. ' + q.question + '</div>' +
      '<div class="w-info">' +
      '<span class="w-badge correct-ans">✅ 正确答案：' + correctOpts + '</span>' +
      '</div>' +
      '</div>';
  }).join('');
}

function removeWrong(index, type, question) {
  const arr = wrongBook[type];
  const idx = arr.findIndex(q => q.question === question);
  if (idx >= 0) {
    arr.splice(idx, 1);
    saveWrongBook();
    renderWrongBook();
    showToast('已从错题库移除');
  }
}

function clearWrongBook() {
  if (confirm('确定要清空所有错题记录吗？此操作不可撤销。')) {
    wrongBook = { single: [], multi: [] };
    saveWrongBook();
    renderWrongBook();
    showToast('错题库已清空');
  }
}

// Confetti
function spawnConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  const colors = ['#c84650','#d4a853','#3ecf8e','#4a6cf7','#f0b848','#ff6b9d','#48dbfb'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = -(Math.random() * 60) + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.animationDuration = (1.2 + Math.random() * 1.5) + 's';
    piece.style.width = (6 + Math.random() * 10) + 'px';
    piece.style.height = (6 + Math.random() * 10) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(piece);
  }
  document.body.appendChild(container);
  setTimeout(() => container.remove(), 2000);
}

// Toast
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (answered && e.key === 'Enter') {
    const nextBtn = document.getElementById('btn-next');
    if (nextBtn.style.display !== 'none') nextQuestion();
    return;
  }
  if (mode === 'multi' && !answered && e.key === 'Enter') {
    if (selectedOptions.length > 0) submitMulti();
    return;
  }
  if (!answered && mode === 'single') {
    const key = e.key.toUpperCase();
    if ('ABCDEFG'.includes(key)) {
      const question = questions[currentIndex];
      if (question.options.some(o => o.label === key)) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => {
          if (b.querySelector('.opt-label').textContent === key) b.click();
        });
      }
    }
  }
  if (!answered && mode === 'multi') {
    const key = e.key.toUpperCase();
    if ('ABCDEFG'.includes(key)) {
      const question = questions[currentIndex];
      if (question.options.some(o => o.label === key)) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => {
          if (b.querySelector('.opt-label').textContent === key) b.click();
        });
      }
    }
  }
});

// Init
updateWrongBadge();
</script>
</body>
</html>
